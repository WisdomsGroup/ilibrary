<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>iLibrary Scene Test</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#bg{position:fixed;inset:0;background-size:cover;background-position:center;transition:.5s}#rain{position:fixed;inset:0;display:none;pointer-events:none;overflow:hidden}#rain:before{content:'';position:absolute;inset:-20%;background-image:repeating-linear-gradient(115deg,transparent 0 16px,rgba(255,255,255,.45) 17px 18px,transparent 19px 34px);animation:r .4s linear infinite;opacity:.9}.fog{position:absolute;inset:0;background:radial-gradient(circle at center,transparent 20%,rgba(0,0,0,.15) 50%,rgba(0,0,0,.55) 100%)}.controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:grid;grid-template-columns:1fr 1fr;gap:10px;width:92%;max-width:420px;z-index:20}button{padding:16px;border-radius:18px;border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.45);backdrop-filter:blur(12px);color:#fff;font-size:15px;font-weight:700}.title{position:fixed;top:28px;left:28px;color:#fff;font-size:42px;font-weight:900;letter-spacing:.12em;text-shadow:0 0 24px rgba(255,255,255,.35);z-index:20}@keyframes r{from{transform:translateY(-40px)}to{transform:translateY(40px)}}</style></head><body><div id='bg'></div><div id='rain'><div class='fog'></div></div><div class='title'>讀書修仙</div><div class='controls'><button onclick="setMode('day',false)">白天｜無雨</button><button onclick="setMode('day',true)">白天｜有雨</button><button onclick="setMode('night',false)">夜晚｜無雨</button><button onclick="setMode('night',true)">夜晚｜有雨</button></div><script>const day='data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD';const night='data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD';function setMode(mode,rain){document.getElementById('bg').style.backgroundImage=`url(${mode==='day'?day:night})`;document.getElementById('rain').style.display=rain?'block':'none';document.body.style.background=mode==='day'?'#89b7db':'#02040a'}setMode('day',false)</script></body></html>
