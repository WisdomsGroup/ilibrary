<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>iLibrary Login Scene</title>
  <style>
    :root {
      --bg1: #07111f;
      --bg2: #0d2442;
      --glow: #35d8ff;
      --gold: #d8b56d;
      --text: #f4f8ff;
      --muted: rgba(244,248,255,.72);
      --card: rgba(8,16,30,.52);
      --border: rgba(156,220,255,.34);
    }
    * { box-sizing: border-box; }
    html, body { margin:0; width:100%; height:100%; overflow:hidden; font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", sans-serif; background:#050914; color:var(--text); }
    body.day {
      --bg1: #7fb4dd;
      --bg2: #f4d58d;
      --glow: #fff0aa;
      --card: rgba(22,31,38,.36);
      --border: rgba(255,246,208,.42);
      --muted: rgba(255,255,255,.82);
    }
    .scene { position:relative; width:100vw; height:100vh; min-height:720px; isolation:isolate; background: radial-gradient(circle at 55% 16%, rgba(95,194,255,.28), transparent 28%), linear-gradient(180deg, var(--bg1), var(--bg2) 55%, #050914); }
    .sky { position:absolute; inset:0; z-index:0; background:
      radial-gradient(circle at 76% 15%, rgba(255,255,255,.9) 0 2.2rem, transparent 2.3rem),
      radial-gradient(circle at 42% 32%, rgba(99,177,255,.2), transparent 26%),
      linear-gradient(180deg, rgba(9,20,42,.15), rgba(2,6,18,.76)); transition: .8s ease; }
    body.day .sky { background:
      radial-gradient(circle at 72% 17%, rgba(255,238,155,.98) 0 3.2rem, rgba(255,230,132,.35) 3.5rem, transparent 8rem),
      radial-gradient(circle at 25% 25%, rgba(255,255,255,.62), transparent 18%),
      linear-gradient(180deg, rgba(142,202,238,.72), rgba(240,216,158,.35)); }
    .city { position:absolute; left:0; right:0; bottom:23%; height:39%; z-index:1; opacity:.86; background:
      linear-gradient(to top, rgba(1,4,12,.92), rgba(1,4,12,.22), transparent),
      repeating-linear-gradient(90deg, transparent 0 19px, rgba(67,177,255,.18) 19px 21px, transparent 21px 44px); clip-path: polygon(0 61%,5% 55%,9% 60%,13% 43%,17% 58%,21% 49%,25% 63%,30% 45%,34% 59%,38% 50%,42% 62%,47% 31%,50% 61%,55% 47%,59% 58%,64% 39%,69% 62%,73% 44%,78% 57%,83% 47%,88% 62%,93% 43%,100% 56%,100% 100%,0 100%); }
    .taipei101 { position:absolute; left:57%; bottom:31%; width:64px; height:330px; z-index:2; filter: drop-shadow(0 0 16px rgba(59,211,255,.72)); opacity:.95; }
    .taipei101::before { content:""; position:absolute; inset:0; background: linear-gradient(180deg, rgba(113,231,255,.9), rgba(22,93,142,.78)); clip-path: polygon(45% 0,55% 0,58% 8%,70% 9%,66% 18%,72% 19%,68% 29%,75% 31%,70% 42%,77% 44%,71% 56%,80% 58%,72% 71%,78% 74%,66% 100%,34% 100%,22% 74%,28% 71%,20% 58%,29% 56%,23% 44%,30% 42%,25% 31%,32% 29%,28% 19%,34% 18%,30% 9%,42% 8%); }
    body.day .city { opacity:.45; filter:saturate(.75) brightness(1.3); }
    body.day .taipei101 { filter: drop-shadow(0 0 8px rgba(255,245,210,.45)); opacity:.62; }
    .mountains { position:absolute; left:-10%; right:-10%; bottom:27%; height:42%; z-index:1; background: linear-gradient(to top, rgba(10,24,36,.9), rgba(30,64,76,.42), transparent); clip-path: polygon(0 90%,12% 58%,22% 78%,34% 38%,48% 82%,62% 45%,74% 80%,88% 32%,100% 86%,100% 100%,0 100%); opacity:.72; }
    .cave { position:absolute; inset:0; z-index:4; pointer-events:none; background:
      radial-gradient(ellipse at 50% 46%, transparent 0 42%, rgba(0,0,0,.18) 52%, rgba(0,0,0,.75) 73%, #02050b 100%),
      linear-gradient(90deg, rgba(0,0,0,.88), transparent 24%, transparent 76%, rgba(0,0,0,.88)); }
    .floor { position:absolute; left:0; right:0; bottom:0; height:31%; z-index:3; background: radial-gradient(ellipse at 50% 0%, rgba(77,203,255,.26), transparent 34%), linear-gradient(180deg, rgba(12,20,30,.58), #03060b 70%); border-top:1px solid rgba(170,230,255,.14); }
    .circle { position:absolute; left:50%; bottom:10.5%; width:300px; height:90px; transform:translateX(-50%); z-index:5; border:1px solid rgba(58,218,255,.42); border-radius:50%; box-shadow:0 0 24px rgba(35,210,255,.35), inset 0 0 24px rgba(35,210,255,.16); animation:pulse 3.8s ease-in-out infinite; }
    .person { position:absolute; left:50%; bottom:14%; width:78px; height:162px; transform:translateX(-50%); z-index:6; filter: drop-shadow(0 0 16px rgba(42,211,255,.62)); }
    .person::before { content:""; position:absolute; left:29px; top:4px; width:22px; height:22px; border-radius:50%; background:#07111f; box-shadow:0 0 0 5px rgba(61,209,255,.08); }
    .person::after { content:""; position:absolute; left:18px; top:28px; width:44px; height:116px; background:linear-gradient(180deg,#0e2740,#07111f); clip-path:polygon(50% 0,70% 13%,86% 100%,55% 84%,50% 100%,45% 84%,14% 100%,30% 13%); }
    .rain { position:absolute; inset:-20%; z-index:7; pointer-events:none; opacity:0; background-image: repeating-linear-gradient(115deg, rgba(170,230,255,.0) 0 16px, rgba(170,230,255,.42) 17px 18px, rgba(170,230,255,.0) 19px 34px); animation: rain .42s linear infinite; transition:.5s ease; }
    body.rainy .rain { opacity:.65; }
    .mist { position:absolute; inset:0; z-index:8; pointer-events:none; opacity:.5; background: radial-gradient(ellipse at 38% 59%, rgba(190,235,255,.2), transparent 32%), radial-gradient(ellipse at 62% 52%, rgba(100,200,255,.16), transparent 38%); animation: drift 10s ease-in-out infinite alternate; }
    body.day .mist { opacity:.72; }
    .particles { position:absolute; inset:0; z-index:9; pointer-events:none; background-image: radial-gradient(circle, rgba(79,224,255,.9) 0 1px, transparent 1.5px), radial-gradient(circle, rgba(197,150,255,.7) 0 1px, transparent 1.5px); background-size: 120px 120px, 170px 170px; animation: float 16s linear infinite; opacity:.7; }
    body.day .particles { opacity:.25; }
    .ui { position:relative; z-index:10; height:100%; padding: max(24px, env(safe-area-inset-top)) 24px max(20px, env(safe-area-inset-bottom)); display:flex; flex-direction:column; justify-content:space-between; }
    .top { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; }
    .brand { writing-mode:vertical-rl; font-size:48px; font-weight:800; letter-spacing:.12em; text-shadow:0 0 18px rgba(120,225,255,.75); line-height:1.05; }
    .slogan { margin-top:18px; writing-mode:vertical-rl; color:var(--muted); letter-spacing:.15em; line-height:1.8; font-size:15px; }
    .tagWrap { position:relative; width:110px; height:250px; transform-origin:50% 0%; animation:swing 4.8s ease-in-out infinite; }
    .chain { position:absolute; left:50%; top:-14px; width:2px; height:44px; background:linear-gradient(#d2b77d,#6b4a23); }
    .wood { position:absolute; top:35px; left:0; right:0; height:178px; border-radius:12px; background:linear-gradient(90deg,#3d2314,#6d4122 48%,#2d190f); border:1px solid rgba(255,210,130,.42); box-shadow: inset 0 0 18px rgba(0,0,0,.5), 0 18px 28px rgba(0,0,0,.34); display:flex; align-items:center; justify-content:center; }
    .wood span { writing-mode:vertical-rl; font-size:20px; color:#ffe8b4; letter-spacing:.16em; text-shadow:0 0 10px rgba(255,195,80,.55); }
    .tassel { position:absolute; left:50%; top:211px; width:2px; height:38px; background:#b58a52; box-shadow:-8px 8px 0 -1px #8d5b3c, 8px 8px 0 -1px #8d5b3c; }
    .login { width:min(88vw, 380px); margin:0 auto 18px; padding:24px 22px 18px; border:1px solid var(--border); border-radius:28px; background:var(--card); backdrop-filter: blur(18px); box-shadow:0 28px 70px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.12); text-align:center; }
    .login h1 { margin:0 0 8px; font-size:25px; letter-spacing:.08em; }
    .login p { margin:0 0 22px; color:var(--muted); font-size:14px; }
    .btn { width:100%; height:52px; border-radius:16px; border:1px solid rgba(167,222,255,.28); background:rgba(255,255,255,.11); color:#fff; font-size:16px; font-weight:700; margin:10px 0; display:flex; align-items:center; justify-content:center; gap:12px; box-shadow: inset 0 1px 0 rgba(255,255,255,.12); }
    body.day .btn { background:rgba(255,255,255,.62); color:#233041; }
    .guest { opacity:.8; }
    .meta { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; width:min(92vw,420px); margin:0 auto; }
    .pill { padding:12px 10px; border:1px solid rgba(148,219,255,.22); background:rgba(3,10,22,.4); border-radius:18px; backdrop-filter: blur(12px); text-align:center; font-size:12px; color:var(--muted); }
    .pill b { display:block; color:#fff; font-size:15px; margin-top:3px; }
    .controls { position:absolute; right:18px; top:max(18px, env(safe-area-inset-top)); z-index:20; display:flex; gap:8px; }
    .mini { border:1px solid rgba(255,255,255,.18); background:rgba(0,0,0,.32); color:white; border-radius:999px; padding:8px 11px; font-size:12px; backdrop-filter:blur(10px); }
    @keyframes swing { 0%,100%{ transform:rotate(-2deg); } 50%{ transform:rotate(2.2deg); } }
    @keyframes pulse { 0%,100%{ opacity:.55; transform:translateX(-50%) scale(1); } 50%{ opacity:1; transform:translateX(-50%) scale(1.04); } }
    @keyframes rain { from{ transform:translateY(-40px); } to{ transform:translateY(40px); } }
    @keyframes drift { from{ transform:translateX(-3%); } to{ transform:translateX(4%); } }
    @keyframes float { from{ background-position:0 0, 0 0; } to{ background-position:120px -240px, -170px -300px; } }
    @media (min-width: 700px) { .scene{ width:430px; height:932px; min-height:932px; margin:auto; border-radius:36px; overflow:hidden; box-shadow:0 40px 110px rgba(0,0,0,.55); } body{ display:grid; place-items:center; background:#030611; } }
  </style>
</head>
<body>
  <main class="scene">
    <div class="sky"></div>
    <div class="mountains"></div>
    <div class="city"></div>
    <div class="taipei101"></div>
    <div class="floor"></div>
    <div class="circle"></div>
    <div class="person"></div>
    <div class="cave"></div>
    <div class="rain"></div>
    <div class="mist"></div>
    <div class="particles"></div>

    <div class="controls">
      <button class="mini" id="toggleTime">日 / 夜</button>
      <button class="mini" id="toggleRain">雨</button>
    </div>

    <section class="ui">
      <div class="top">
        <div>
          <div class="brand">讀書<br/>修仙</div>
          <div class="slogan">人在凡塵中修行<br/>於時間中成仙</div>
        </div>
        <div class="tagWrap">
          <div class="chain"></div>
          <div class="wood"><span id="woodText">夜深靈氣濃</span></div>
          <div class="tassel"></div>
        </div>
      </div>

      <div>
        <section class="login">
          <h1>踏入修行之路</h1>
          <p>你的修行，由此開始</p>
          <button class="btn">　使用 Apple 登入</button>
          <button class="btn">G　使用 Google 登入</button>
          <button class="btn guest">訪客試玩</button>
        </section>
        <div class="meta">
          <div class="pill">時辰<b id="timeText">子時</b></div>
          <div class="pill">天氣<b id="weatherText">偵測中</b></div>
          <div class="pill">靈氣<b id="auraText">極高</b></div>
        </div>
      </div>
    </section>
  </main>

<script>
  const body = document.body;
  const timeText = document.getElementById('timeText');
  const weatherText = document.getElementById('weatherText');
  const auraText = document.getElementById('auraText');
  const woodText = document.getElementById('woodText');

  function applyTimeByHour(hour) {
    const isDay = hour >= 6 && hour < 18;
    body.classList.toggle('day', isDay);
    timeText.textContent = isDay ? '辰時' : '子時';
    auraText.textContent = isDay ? '中等' : '極高';
    woodText.textContent = isDay ? '今日宜修行' : '夜深靈氣濃';
  }

  function applyWeather(code) {
    const rainy = [51,53,55,61,63,65,80,81,82,95,96,99].includes(code);
    body.classList.toggle('rainy', rainy);
    weatherText.textContent = rainy ? '有雨' : (body.classList.contains('day') ? '晴 / 多雲' : '無雨');
  }

  applyTimeByHour(new Date().getHours());

  document.getElementById('toggleTime').onclick = () => {
    body.classList.toggle('day');
    const isDay = body.classList.contains('day');
    timeText.textContent = isDay ? '辰時' : '子時';
    auraText.textContent = isDay ? '中等' : '極高';
    woodText.textContent = isDay ? '今日宜修行' : '夜深靈氣濃';
    weatherText.textContent = body.classList.contains('rainy') ? '有雨' : (isDay ? '晴 / 多雲' : '無雨');
  };

  document.getElementById('toggleRain').onclick = () => {
    body.classList.toggle('rainy');
    weatherText.textContent = body.classList.contains('rainy') ? '有雨' : (body.classList.contains('day') ? '晴 / 多雲' : '無雨');
  };

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(async pos => {
      const { latitude, longitude } = pos.coords;
      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=weather_code&timezone=auto`;
        const res = await fetch(url);
        const data = await res.json();
        applyWeather(data.current.weather_code);
      } catch(e) {
        weatherText.textContent = body.classList.contains('day') ? '晴 / 多雲' : '無雨';
      }
    }, () => {
      weatherText.textContent = body.classList.contains('day') ? '晴 / 多雲' : '無雨';
    });
  }
</script>
</body>
</html>
